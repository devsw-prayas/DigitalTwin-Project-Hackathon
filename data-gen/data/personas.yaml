# Preventive Health Digital Twin — Persona Configs
# Each persona maps to a real-life archetype.
# All signal values are daily aggregates.
# Special keys:
#   recovery_days     — Recovering only: days until plateau
#   cycle_period_days — Hormonal only: menstrual cycle length
#   aqi_spike_count   — HighAQI only: pollution events per year
#   aqi_spike_mag     — HighAQI only: peak AQI delta during event

personas:

  healthy:
    description: "Clean eater, regular sleep, gym 4x/week, low-stress job, clean air suburb"
    seed: 101

    # Ground truth risk params
    cardio:
      base: 0.10
      drift_per_day: 0.00003       # barely worsening
      event_day: -1                # no acute event
      event_magnitude: 0.0
      event_width_days: 20
      seasonal_amplitude: 0.02

    mental:
      base: 0.14
      drift_per_day: 0.00005
      event_day: 200               # mild mid-year stress
      event_magnitude: 0.06
      event_width_days: 15
      seasonal_amplitude: 0.03

    # Signal baselines (clean, no noise)
    signals:
      hrv_rmssd_ms: 70.0           # high — well-trained
      resting_hr_bpm: 57.0
      spo2_pct: 98.8
      sleep_efficiency_pct: 91.0
      rem_min: 105.0
      deep_min: 90.0
      steps: 10500.0
      active_min: 52.0
      screen_off_min: 75.0         # low screen time
      aqi_pm25: 12.0
      ambient_temp_c: 22.0

    # Per-signal noise std (clean life = low noise)
    noise:
      hrv_rmssd_ms: 4.0
      resting_hr_bpm: 2.0
      spo2_pct: 0.3
      sleep_efficiency_pct: 0.03
      rem_min: 8.0
      deep_min: 7.0
      steps: 800.0
      active_min: 6.0
      screen_off_min: 12.0
      aqi_pm25: 3.0
      ambient_temp_c: 2.0

