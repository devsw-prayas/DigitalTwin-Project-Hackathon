# Preventive Health Digital Twin — Persona Configs
# Each persona maps to a real-life archetype.
# All signal values are daily aggregates.
#
# Special keys:
#   recovery_days          — Recovering/new_parent: days until risk plateaus
#   cycle_period_days      — Hormonal: menstrual cycle length
#   aqi_spike_count        — HighAQI: pollution events per year
#   aqi_spike_mag          — HighAQI: peak AQI delta during event
#   overtraining_period_days — Athlete: days between overtraining events
#   overtraining_magnitude   — Athlete: cardio risk spike magnitude
#   overtraining_width_days  — Athlete: recovery window in days
#   shift_period_days        — ShiftWorker: rotation cycle length
#   shift_mental_amplitude   — ShiftWorker: mental risk swing per cycle
#   flare_count              — ChronicIllness: flare events per year
#   flare_magnitude          — ChronicIllness: risk spike magnitude
#   flare_width_days         — ChronicIllness: flare duration
#   semester_period_days     — CollegeStudent: stress cycle length
#   exam_mental_amplitude    — CollegeStudent: mental spike at exam week
#   travel_count             — Traveler: trips per year
#   travel_width_days        — Traveler: disruption window per trip
#   travel_mental_magnitude  — Traveler: mental risk spike per trip
#   travel_cardio_magnitude  — Traveler: cardio risk spike per trip
#
# DIVERGENCE NOTE (new personas at bottom):
#   Personas marked [DIVERGENT] are specifically designed so cardio and mental
#   ground truth curves move in opposite directions or have large magnitude
#   asymmetry. These are critical for JSD training signal.

