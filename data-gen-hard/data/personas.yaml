  # ═══════════════════════════════════════════════════════════════════════════
  # DIVERGENCE-MAXIMIZING PERSONAS
  # Cardio and mental move in opposite directions or with large magnitude
  # asymmetry. Critical for JSD training signal.
  # ═══════════════════════════════════════════════════════════════════════════

  cardiac_stoic:
    # [DIVERGENT] High and worsening cardio risk. Mental rock-solid.
    # Archetype: type-A executive — physical health declining but psychologically
    # resilient, emotionally regulated, low perceived stress despite poor metabolic markers.
    # Cardio-primary signals dominate: resting HR elevated, SpO2 drifting down,
    # active minutes collapsing. Mental signals flat.
    description: "Type-A executive — worsening cardio (hypertension, inactivity) but psychologically resilient and low-stress"
    seed: 2001

    cardio:
      base: 0.52
      drift_per_day: 0.00025       # strong upward cardio drift
      event_day: 180
      event_magnitude: 0.14        # large cardio event (hypertensive episode)
      event_width_days: 20
      seasonal_amplitude: 0.02

    mental:
      base: 0.11                   # low mental baseline
      drift_per_day: 0.00001       # barely moves
      event_day: -1
      event_magnitude: 0.0
      event_width_days: 15
      seasonal_amplitude: 0.01     # almost no seasonal mental variation

    signals:
      hrv_rmssd_ms: 28.0           # low — poor autonomic tone
      resting_hr_bpm: 84.0         # elevated
      spo2_pct: 97.0               # borderline
      sleep_efficiency_pct: 84.0   # good sleep — mentally well
      rem_min: 96.0                # good REM — low mental stress
      deep_min: 82.0
      steps: 2800.0                # low activity
      active_min: 10.0
      screen_off_min: 60.0         # disciplined screen use
